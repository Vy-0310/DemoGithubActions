name: CI/CD Pipeline Bai 7

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ GitHub [cite: 814]
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java để build file .jar
      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cấp quyền và đóng gói ứng dụng (Tạo file .jar) [cite: 168]
      - name: Build project with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # 4. Đăng nhập Docker Hub bằng Secrets [cite: 817]
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Image từ Dockerfile và Push lên Registry [cite: 177, 179]
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: nguyenhongyenvy28/spring-app:bai7-auto